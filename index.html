<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw Dashboard</title>
<style>
:root{--bg:#0a0a0f;--card:#12121a;--border:#1e1e2e;--text:#cdd6f4;--subtext:#6c7086;--accent:#cba6f7;--green:#a6e3a1;--red:#f38ba8;--yellow:#f9e2af;--blue:#89b4fa}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{padding:1rem 2rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:1.3rem;color:var(--accent)}
.header h1 span{color:var(--subtext);font-weight:400;font-size:.85rem;margin-left:.5rem}
.conn-status{display:flex;align-items:center;gap:.5rem;font-size:.85rem}
.conn-dot{width:8px;height:8px;border-radius:50%;background:var(--red);animation:pulse 2s infinite}
.conn-dot.online{background:var(--green)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.config-bar{padding:.8rem 2rem;background:var(--card);border-bottom:1px solid var(--border);display:flex;gap:1rem;align-items:center;flex-wrap:wrap}
.config-bar label{font-size:.8rem;color:var(--subtext)}
.config-bar input{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:.4rem .8rem;border-radius:6px;font-size:.85rem;width:200px}
.config-bar input[type=password]{width:150px}
.btn{padding:.4rem 1rem;border:none;border-radius:6px;cursor:pointer;font-size:.8rem;font-weight:600;transition:all .2s}
.btn-primary{background:var(--accent);color:var(--bg)}
.btn-primary:hover{opacity:.8}
.btn-sm{padding:.3rem .6rem;font-size:.75rem}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1rem;padding:1.5rem 2rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.2rem}
.card h3{font-size:.9rem;color:var(--accent);margin-bottom:.8rem;display:flex;align-items:center;gap:.5rem}
.card h3 .icon{font-size:1.1rem}
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.8rem}
.stat{background:var(--bg);border-radius:8px;padding:.8rem;text-align:center}
.stat .val{font-size:1.5rem;font-weight:700;color:var(--text)}
.stat .label{font-size:.7rem;color:var(--subtext);margin-top:.2rem}
.session-list{max-height:250px;overflow-y:auto}
.session-item{display:flex;justify-content:space-between;align-items:center;padding:.5rem .6rem;background:var(--bg);border-radius:6px;margin-bottom:.4rem;font-size:.8rem}
.session-item .key{color:var(--blue);font-family:monospace;font-size:.7rem;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.session-item .model{color:var(--subtext);font-size:.7rem}
.session-item .tokens{color:var(--yellow);font-size:.75rem}
.log-box{background:var(--bg);border-radius:8px;padding:.8rem;font-family:monospace;font-size:.75rem;max-height:200px;overflow-y:auto;color:var(--subtext);line-height:1.6}
.log-box .err{color:var(--red)}
.log-box .warn{color:var(--yellow)}
.log-box .ok{color:var(--green)}
.health-grid{display:flex;flex-wrap:wrap;gap:.5rem}
.health-tag{padding:.3rem .6rem;border-radius:20px;font-size:.75rem;font-weight:600}
.health-ok{background:rgba(166,227,161,.15);color:var(--green)}
.health-warn{background:rgba(249,226,175,.15);color:var(--yellow)}
.health-err{background:rgba(243,139,168,.15);color:var(--red)}
.quick-actions{display:flex;flex-wrap:wrap;gap:.5rem}
.quick-btn{padding:.5rem 1rem;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:8px;cursor:pointer;font-size:.8rem;transition:all .2s;display:flex;align-items:center;gap:.4rem}
.quick-btn:hover{border-color:var(--accent);color:var(--accent)}
.refresh-auto{margin-left:auto;display:flex;align-items:center;gap:.5rem;font-size:.75rem;color:var(--subtext)}
</style>
</head>
<body>
<div class="header">
  <h1>🦞 OpenClaw Dashboard <span>v2026.5.7</span></h1>
  <div class="conn-status"><div class="conn-dot" id="connDot"></div><span id="connText">未连接</span></div>
</div>
<div class="config-bar">
  <label>Gateway</label><input id="gwUrl" value="http://192.168.1.5:18789" placeholder="http://host:port">
  <label>Token</label><input id="gwToken" type="password" placeholder="Gateway Token">
  <button class="btn btn-primary" onclick="connect()">连接</button>
  <div class="refresh-auto">
    <label><input type="checkbox" id="autoRefresh" checked> 自动刷新</label>
    <span id="refreshInterval">5s</span>
  </div>
</div>
<div class="grid">
  <div class="card">
    <h3><span class="icon">📊</span> 系统概览</h3>
    <div class="stat-grid">
      <div class="stat"><div class="val" id="uptime">-</div><div class="label">运行时间</div></div>
      <div class="stat"><div class="val" id="sessions">-</div><div class="label">活跃会话</div></div>
      <div class="stat"><div class="val" id="model">-</div><div class="label">主模型</div></div>
      <div class="stat"><div class="val" id="tokens">-</div><div class="label">Token 使用</div></div>
    </div>
  </div>
  <div class="card">
    <h3><span class="icon">💚</span> 健康状态</h3>
    <div class="health-grid" id="healthGrid">
      <span class="health-tag health-warn">等待连接...</span>
    </div>
  </div>
  <div class="card">
    <h3><span class="icon">⚡</span> 快捷操作</h3>
    <div class="quick-actions">
      <button class="quick-btn" onclick="runCmd('openclaw gateway restart')">🔄 重启 Gateway</button>
      <button class="quick-btn" onclick="runCmd('openclaw status')">📋 状态检查</button>
      <button class="quick-btn" onclick="runCmd('openclaw doctor')">🩺 诊断</button>
      <button class="quick-btn" onclick="clearLogs()">🧹 清理日志</button>
      <button class="quick-btn" onclick="refreshData()">🔃 刷新数据</button>
    </div>
  </div>
  <div class="card">
    <h3><span class="icon">💬</span> 活跃会话</h3>
    <div class="session-list" id="sessionList">
      <div class="session-item"><span style="color:var(--subtext)">连接后显示...</span></div>
    </div>
  </div>
  <div class="card" style="grid-column:span 2">
    <h3><span class="icon">📝</span> 实时日志</h3>
    <div class="log-box" id="logBox">等待连接...</div>
  </div>
</div>
<script>
let ws=null,refreshTimer=null;
const $=id=>document.getElementById(id);
function log(msg,type='info'){const box=$('logBox');const t=new Date().toLocaleTimeString();const cls=type==='error'?'err':type==='warn'?'warn':type==='ok'?'ok':'';box.innerHTML+=`<div class="${cls}">[${t}] ${msg}</div>`;box.scrollTop=box.scrollHeight}
function connect(){
  const url=$('gwUrl').value.replace('http','ws');
  const token=$('gwToken').value;
  log('正在连接 '+url+'...');
  try{
    ws=new WebSocket(url+'/ws');
    ws.onopen=()=>{$('connDot').classList.add('online');$('connText').textContent='已连接';log('✅ WebSocket 已连接','ok');refreshData()};
    ws.onclose=()=>{$('connDot').classList.remove('online');$('connText').textContent='已断开';log('❌ 连接断开','error')};
    ws.onerror=()=>log('❌ 连接错误','error');
    ws.onmessage=e=>{try{handleMsg(JSON.parse(e.data))}catch(err){}};
  }catch(e){log('❌ '+e.message,'error')}
  if(refreshTimer)clearInterval(refreshTimer);
  if($('autoRefresh').checked)refreshTimer=setInterval(refreshData,5000);
}
function handleMsg(data){
  if(data.type==='status')updateStatus(data);
}
function refreshData(){
  const url=$('gwUrl').value;
  const token=$('gwToken').value;
  const headers=token?{'Authorization':'Bearer '+token}:{};
  // Health
  fetch(url+'/health',{headers}).then(r=>r.json()).then(d=>{
    $('healthGrid').innerHTML=d.ok?'<span class="health-tag health-ok">Gateway: 在线</span>':'<span class="health-tag health-err">Gateway: 异常</span>';
  }).catch(()=>$('healthGrid').innerHTML='<span class="health-tag health-err">Gateway: 离线</span>');
  // Status via tool invoke
  fetch(url+'/tools/invoke',{method:'POST',headers:{...headers,'Content-Type':'application/json'},body:JSON.stringify({tool:'session_status',args:{sessionKey:'current'}})})
  .then(r=>r.json()).then(d=>{
    if(d.result){
      const lines=d.result.split('\n');
      lines.forEach(l=>{
        if(l.includes('Uptime'))$('uptime').textContent=l.split('Uptime:')[1]?.trim()?.split('·')[0]||'-';
        if(l.includes('Model'))$('model').textContent=l.split('Model:')[1]?.trim()?.split('·')[0]||'-';
        if(l.includes('Tokens'))$('tokens').textContent=l.split('Tokens:')[1]?.trim()?.split('·')[0]||'-';
      });
    }
  }).catch(()=>{});
  // Sessions
  fetch(url+'/tools/invoke',{method:'POST',headers:{...headers,'Content-Type':'application/json'},body:JSON.stringify({tool:'sessions_list',args:{}})})
  .then(r=>r.json()).then(d=>{
    if(d.result){
      try{
        const sessions=JSON.parse(d.result);
        $('sessions').textContent=sessions.length||0;
        $('sessionList').innerHTML=sessions.slice(0,10).map(s=>`
          <div class="session-item">
            <span class="key" title="${s.key}">${s.key?.split(':').pop()||'?'}</span>
            <span class="model">${s.model||'?'}</span>
            <span class="tokens">${s.tokens||'-'}</span>
          </div>
        `).join('');
      }catch(e){}
    }
  }).catch(()=>{});
  log('数据已刷新','ok');
}
function runCmd(cmd){log('执行: '+cmd+' (需在服务器端运行)','warn')}
function clearLogs(){$('logBox').innerHTML='';log('日志已清理','ok')}
// Auto connect on load
window.onload=()=>{connect()};
</script>
</body>
</html>
